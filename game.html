<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRAS DE FER INSOUMIS — Combat !</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

<!-- Background layer -->
<div class="screen active" style="position:fixed;z-index:0;">
  <div class="particles" id="particles-game"></div>
</div>

<!-- ══════════════════════════════════════════════════
     GAME LAYOUT
══════════════════════════════════════════════════ -->
<div class="game-wrapper">

  <!-- ── HEADER ── -->
  <div class="game-header glass-card">

    <!-- Round dots + label -->
    <div class="round-section">
      <div class="round-label" id="round-label">ROUND 1 / 3</div>
      <div class="round-dots" id="round-dots">
        <div class="round-dot" id="dot-1"></div>
        <div class="round-dot" id="dot-2"></div>
        <div class="round-dot" id="dot-3"></div>
      </div>
    </div>

    <!-- Timer -->
    <div class="timer-wrapper">
      <div class="timer-label">TEMPS</div>
      <div class="timer-display" id="timer-display">30</div>
    </div>

    <!-- Score -->
    <div class="score-display">
      <span class="score-num" id="score-p1" style="color:var(--p1-light)">0</span>
      <span class="score-sep">—</span>
      <span class="score-num" id="score-p2" style="color:var(--p2-light)">0</span>
    </div>

  </div>

  <!-- ── ARENA ── -->
  <div class="arena">
    <div class="players-row">

      <!-- Player 1 -->
      <div class="player-panel" id="panel-p1">
        <div class="player-avatar-ring p1" id="ring-p1">
          <img class="player-avatar-img" id="avatar-p1" src="" alt="Joueur 1"/>
        </div>
        <div class="player-name-display" id="name-p1">Joueur 1</div>
        <div class="force-bar-wrap">
          <div class="force-bar p1" id="fbar-p1" style="width:0%"></div>
        </div>
        <div class="force-value" id="fval-p1">0 %</div>
      </div>

      <!-- SVG Arm Wrestling -->
      <div class="arm-arena">
        <svg id="arm-svg" viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg" overflow="visible">
          <defs>
            <!-- Left arm gradient -->
            <linearGradient id="gL" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#aa1122"/>
              <stop offset="50%"  stop-color="#ff3344"/>
              <stop offset="100%" stop-color="#ff7722"/>
            </linearGradient>
            <!-- Right arm gradient -->
            <linearGradient id="gR" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%"   stop-color="#0044bb"/>
              <stop offset="50%"  stop-color="#1188ff"/>
              <stop offset="100%" stop-color="#00ccff"/>
            </linearGradient>
            <!-- Table gradient -->
            <linearGradient id="gT" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%"   stop-color="#6b3820"/>
              <stop offset="100%" stop-color="#1a0800"/>
            </linearGradient>
            <!-- Glow filters -->
            <filter id="glowL" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glowR" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glowClash" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- ── TABLE ── -->
          <rect x="0" y="208" width="560" height="40" rx="6" fill="url(#gT)"/>
          <rect x="0" y="208" width="560" height="5"  fill="#9a5030" opacity="0.7"/>

          <!-- ── LEFT BICEP (fixed near left elbow) ── -->
          <ellipse id="bicep-l" cx="50" cy="185" rx="34" ry="24"
                   fill="url(#gL)" filter="url(#glowL)"
                   transform="rotate(-35, 50, 208)"/>

          <!-- ── RIGHT BICEP (fixed near right elbow) ── -->
          <ellipse id="bicep-r" cx="510" cy="185" rx="34" ry="24"
                   fill="url(#gR)" filter="url(#glowR)"
                   transform="rotate(35, 510, 208)"/>

          <!-- ── LEFT FOREARM (transformed dynamically by JS) ── -->
          <!-- Origin will be set to left elbow (50, 208); rect extends in +x direction -->
          <rect id="forearm-l" x="0" y="-16" width="220" height="32" rx="16"
                fill="url(#gL)" filter="url(#glowL)"/>

          <!-- ── RIGHT FOREARM (transformed dynamically by JS) ── -->
          <rect id="forearm-r" x="0" y="-16" width="220" height="32" rx="16"
                fill="url(#gR)" filter="url(#glowR)"/>

          <!-- ── CLASH GROUP (translates to hand position) ── -->
          <g id="clash-group">
            <!-- Left fist -->
            <ellipse cx="-20" cy="0" rx="28" ry="25" fill="url(#gL)" filter="url(#glowL)"/>
            <ellipse cx="-20" cy="-9" rx="25" ry="11" fill="#ff6655" opacity="0.45"/>
            <!-- Knuckle lines left -->
            <line x1="-30" y1="-5" x2="-30" y2="10" stroke="#880022" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
            <line x1="-20" y1="-7" x2="-20" y2="10" stroke="#880022" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
            <line x1="-10" y1="-5" x2="-10" y2="10" stroke="#880022" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

            <!-- Right fist -->
            <ellipse cx="20" cy="0" rx="28" ry="25" fill="url(#gR)" filter="url(#glowR)"/>
            <ellipse cx="20" cy="-9" rx="25" ry="11" fill="#55bbff" opacity="0.45"/>
            <!-- Knuckle lines right -->
            <line x1="10"  y1="-5" x2="10"  y2="10" stroke="#003388" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
            <line x1="20"  y1="-7" x2="20"  y2="10" stroke="#003388" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
            <line x1="30"  y1="-5" x2="30"  y2="10" stroke="#003388" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

            <!-- Clash spark -->
            <circle id="clash-spark" cx="0" cy="0" r="9"  fill="#ffcc00" opacity="0.95" filter="url(#glowClash)"/>
            <circle id="clash-aura"  cx="0" cy="0" r="22" fill="#ffcc00" opacity="0.10"/>

            <!-- Impact rays (animate intensity via opacity) -->
            <g id="impact-rays">
              <line x1="0"   y1="-14" x2="0"   y2="-30" stroke="#ffcc00" stroke-width="3"   stroke-linecap="round"/>
              <line x1="-10" y1="-11" x2="-20" y2="-22" stroke="#ffcc00" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="10"  y1="-11" x2="20"  y2="-22" stroke="#ffcc00" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="-16" y1="0"   x2="-30" y2="0"   stroke="#ffcc00" stroke-width="2"   stroke-linecap="round"/>
              <line x1="16"  y1="0"   x2="30"  y2="0"   stroke="#ffcc00" stroke-width="2"   stroke-linecap="round"/>
              <line x1="-9"  y1="10"  x2="-16" y2="20"  stroke="#ffcc00" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="9"   y1="10"  x2="16"  y2="20"  stroke="#ffcc00" stroke-width="1.8" stroke-linecap="round"/>
            </g>
          </g>

          <!-- Position indicator line (vertical, at hand position) -->
          <line id="pos-line" x1="280" y1="208" x2="280" y2="248"
                stroke="rgba(255,204,0,0.55)" stroke-width="2.5" stroke-dasharray="4,3"/>

        </svg>

        <!-- Position bar -->
        <div class="arm-pos-bar">
          <div class="arm-pos-fill" id="pos-fill"></div>
          <div class="arm-pos-marker" id="pos-marker" style="left:50%"></div>
        </div>
        <div class="arm-pos-labels">
          <span id="pos-label-p1">◄ JOUEUR 1</span>
          <span id="pos-label-p2">ADVERSAIRE ►</span>
        </div>
      </div>

      <!-- Player 2 / AI -->
      <div class="player-panel" id="panel-p2">
        <div class="player-avatar-ring ai" id="ring-p2">
          <img class="player-avatar-img" id="avatar-p2" src="" alt="Adversaire"/>
        </div>
        <div class="player-name-display" id="name-p2">Adversaire</div>
        <div class="force-bar-wrap">
          <div class="force-bar ai" id="fbar-p2" style="width:0%"></div>
        </div>
        <div class="force-value" id="fval-p2">0 %</div>
      </div>

    </div><!-- /players-row -->
  </div><!-- /arena -->

  <!-- ── CLICK ZONE ── -->
  <div class="click-zone" id="click-zone">
    <button class="click-btn p1-btn" id="btn-p1">
      🦾 APPUYER !
      <span class="click-hint">Clic · Espace · Z</span>
    </button>
    <button class="click-btn p2-btn" id="btn-p2" style="display:none;">
      🦾 APPUYER !
      <span class="click-hint">Entrée · M</span>
    </button>
  </div>

</div><!-- /game-wrapper -->

<!-- ══════════════════════════════════════════════════
     OVERLAYS
══════════════════════════════════════════════════ -->

<!-- Countdown -->
<div class="overlay" id="ov-countdown">
  <div class="overlay-card glass-card">
    <div class="overlay-title glow-gold">PRÊT ?</div>
    <div class="countdown-num" id="countdown-num">3</div>
  </div>
</div>

<!-- Round Result -->
<div class="overlay" id="ov-round">
  <div class="overlay-card glass-card">
    <div class="overlay-icon" id="round-icon">🏆</div>
    <div class="overlay-title" id="round-title">ROUND GAGNÉ !</div>
    <div class="overlay-subtitle" id="round-sub">Bien joué !</div>
    <div class="mini-score">
      <span class="mini-score-num" id="rs-p1" style="color:var(--p1-light)">0</span>
      <span class="mini-score-sep">—</span>
      <span class="mini-score-num" id="rs-p2" style="color:var(--p2-light)">0</span>
    </div>
    <div style="margin-top:var(--sp-lg);">
      <button class="btn btn-primary" id="btn-next-round" style="min-width:200px;">
        ROUND SUIVANT →
      </button>
    </div>
  </div>
</div>

<!-- Match Result -->
<div class="overlay" id="ov-match">
  <div class="overlay-card glass-card" style="max-width:500px;">
    <div class="overlay-icon" id="match-icon">👑</div>
    <div class="overlay-title" id="match-title">VICTOIRE !</div>
    <div class="overlay-subtitle" id="match-sub">Tu as dominé l'adversaire !</div>
    <div class="mini-score" style="margin:var(--sp-md) 0;">
      <span class="mini-score-num" id="ms-p1" style="color:var(--p1-light)">2</span>
      <span class="mini-score-sep">—</span>
      <span class="mini-score-num" id="ms-p2" style="color:var(--p2-light)">1</span>
    </div>
    <div class="match-overlay-actions">
      <button class="btn btn-primary" id="btn-rematch">🔄 Revanche</button>
      <button class="btn btn-ghost"   id="btn-menu">🏠 Menu</button>
    </div>
  </div>
</div>

<script src="js/avatar.js"></script>
<script src="js/ai.js"></script>
<script src="js/game.js"></script>
</body>
</html>
